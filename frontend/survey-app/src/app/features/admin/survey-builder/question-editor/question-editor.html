<div class="editor-card">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="editor-row">
      <div class="field" style="flex:1">
        <label>Question Text *</label>
        <textarea formControlName="questionText" rows="2" placeholder="Enter your question..."></textarea>
        @if (form.get('questionText')?.touched && form.get('questionText')?.invalid) {
          <span class="field-error">Question text is required.</span>
        }
      </div>

      <div class="field" style="width:200px">
        <label>Question Type</label>
        <select formControlName="questionType">
          @for (type of questionTypes; track type) {
            <option [value]="type">{{ labelFor(type) }}</option>
          }
        </select>
      </div>

      <div class="field required-toggle">
        <label>Required</label>
        <label class="toggle">
          <input type="checkbox" formControlName="isRequired" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    @if (needsOptions) {
      <div class="options-section">
        <label>Answer Options</label>
        <div formArrayName="options" class="options-list">
          @for (ctrl of options.controls; track $index) {
            <div class="option-row">
              <span class="option-bullet">{{ $index + 1 }}.</span>
              <input [formControlName]="$index" placeholder="Option text" />
              <button type="button" class="btn-icon danger" (click)="removeOption($index)" [disabled]="options.length <= 1">✕</button>
            </div>
          }
        </div>
        <button type="button" class="btn btn-secondary btn-sm" (click)="addOption()">+ Add Option</button>
      </div>
    }

    <div class="editor-actions">
      <button type="button" class="btn btn-secondary" (click)="cancelled.emit()">Cancel</button>
      <button type="submit" class="btn btn-primary">Save Question</button>
    </div>
  </form>
</div>
